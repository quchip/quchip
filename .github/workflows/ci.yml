name: ci

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 5 * * 1"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      - run: uv venv --python 3.11
      - run: uv pip install -e '.[dev,test,dynamiqs]'
      - run: uv run ruff check .
      - run: uv run mypy quchip

  test-fast:
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      - run: uv venv --python ${{ matrix.python }}
      - run: uv pip install -e '.[test]'
      - run: uv run pytest -m "core or physics_sentinel"

  test-full:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      - run: uv venv --python 3.11
      - run: uv pip install -e '.[test,dynamiqs]'
      - run: uv run pytest
